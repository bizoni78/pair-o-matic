name: Android CI

# Robot uruchamia się przy każdym pushu na main / branch feature/*
# oraz przy każdym pull requeście.
on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:

jobs:
  build:
    name: Kompilacja i testy
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Ustaw JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Skonfiguruj Gradle (z cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Nadaj prawa wykonywania gradlew
        run: chmod +x ./gradlew

      - name: Testy jednostkowe
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Zbuduj debugowy APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Zapisz APK jako artefakt
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore
